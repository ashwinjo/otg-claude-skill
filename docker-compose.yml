version: '3.8'

services:
  controller:
    image: ghcr.io/open-traffic-generator/ixia-c-controller:latest
    container_name: ixia-c-controller
    entrypoint: controller
    ports:
      - "8443:8443"
    environment:
      - ENABLE_GRPC=0
    networks:
      - ixia-c-net
    healthcheck:
      test: ["CMD", "curl", "-kL", "https://localhost:8443/api/v1/config"]
      interval: 10s
      timeout: 5s
      retries: 3

  traffic-engine-1:
    image: ghcr.io/open-traffic-generator/ixia-c-traffic-engine:latest
    container_name: ixia-c-traffic-engine-1
    entrypoint: traffic-engine
    environment:
      - CONTROLLER=controller:50000
      - LISTEN_PORT=5555
    depends_on:
      controller:
        condition: service_healthy
    networks:
      - ixia-c-net
    privileged: true

  traffic-engine-2:
    image: ghcr.io/open-traffic-generator/ixia-c-traffic-engine:latest
    container_name: ixia-c-traffic-engine-2
    entrypoint: traffic-engine
    environment:
      - CONTROLLER=controller:50000
      - LISTEN_PORT=5556
    depends_on:
      controller:
        condition: service_healthy
    networks:
      - ixia-c-net
    privileged: true

  protocol-engine:
    image: ghcr.io/open-traffic-generator/ixia-c-protocol-engine:latest
    container_name: ixia-c-protocol-engine
    entrypoint: protocol-engine
    environment:
      - CONTROLLER=controller:50000
    depends_on:
      controller:
        condition: service_healthy
    networks:
      - ixia-c-net
    privileged: true

networks:
  ixia-c-net:
    driver: bridge
