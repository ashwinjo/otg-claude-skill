controller:
  host: "localhost"
  port: 8443
  https: true
  verify_cert: false

ports:
  # Port names must match OTG config port names exactly (P1, P2)
  P1:
    location: "veth-a"
    speed: "1_gbps"
  P2:
    location: "veth-z"
    speed: "1_gbps"

deployment:
  method: "docker-compose"
  # Ixia-c back-to-back: controller + 2 traffic-engines via veth-a / veth-z
  controller_image: "ghcr.io/open-traffic-generator/ixia-c-controller:latest"
  traffic_engine_image: "ghcr.io/open-traffic-generator/ixia-c-traffic-engine:latest"
  veth_pair:
    - veth-a
    - veth-z

test:
  name: "bgp_b2b_convergence"
  description: >
    BGP eBGP back-to-back session test.
    Device 1 (P1): AS 65001, router-id 192.0.2.1, advertises 10.1.0.0/24.
    Device 2 (P2): AS 65002, router-id 192.0.2.2, advertises 10.2.0.0/24.
    Bidirectional traffic at 1234 pps each, 120 seconds.
  metrics_interval_seconds: 5
  stop_on_failure: false
  assertions:
    - name: bgp_sessions_established
      type: bgp_state
      expected_state: "established"
      target_peers:
        - device1.bgp.peer1
        - device2.bgp.peer1
      timeout_seconds: 60
    - name: zero_packet_loss
      type: flow_loss
      max_loss_percent: 0.0
      flows:
        - flow_P1_to_P2
        - flow_P2_to_P1

snappi:
  sdk_version: ">=1.1.0"
  output_script: "test_bgp_b2b.py"
