---
# Ixia-c BGP B2B Deployment — CP+DP (Control Plane + Data Plane)
# Use case: BGP back-to-back testing with 2 traffic engines + 2 protocol engines
# Topology: veth-a <-> veth-z (pushed into container namespaces after startup)
#
# Services:
#   keng-controller          — OTG API controller  (https://localhost:8443)
#   ixia-c-traffic-engine-a  — Traffic engine A     (port location: veth-a)
#   ixia-c-protocol-engine-a — Protocol engine A    (BGP/ISIS, shares TE-A netns)
#   ixia-c-traffic-engine-z  — Traffic engine Z     (port location: veth-z)
#   ixia-c-protocol-engine-z — Protocol engine Z    (BGP/ISIS, shares TE-Z netns)
#
# Quickstart:
#   1. sudo docker compose -f docker-compose-bgp-cpdp.yml up -d
#   2. sudo bash setup-ixia-c-bgp.sh
#
# Cleanup:
#   sudo docker compose -f docker-compose-bgp-cpdp.yml down && sudo ip link delete veth-a

services:

  keng-controller:
    image: ghcr.io/open-traffic-generator/keng-controller:1.48.0-5
    container_name: keng-controller
    # --accept-eula is REQUIRED — controller exits immediately without it
    command: --accept-eula --disable-app-usage-reporter
    ports:
      - "8443:8443"
      - "40051:40051"
    healthcheck:
      # curl/wget not available in image — use /dev/tcp instead
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8443"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  ixia-c-traffic-engine-a:
    image: ghcr.io/open-traffic-generator/ixia-c-traffic-engine:1.8.0.245
    container_name: ixia-c-traffic-engine-a
    privileged: true
    environment:
      # ARG_IFACE_LIST is required — wrong var name is silently ignored
      - ARG_IFACE_LIST=virtual@af_packet,veth-a
      - OPT_LISTEN_PORT=5555
      - OPT_NO_HUGEPAGES=Yes
      - OPT_NO_PINNING=Yes
      - OPT_ADAPTIVE_CPU_USAGE=Yes
      # WAIT_FOR_IFACE required in cpdp — veth is pushed into netns after startup
      - WAIT_FOR_IFACE=Yes
    restart: unless-stopped

  ixia-c-protocol-engine-a:
    image: ghcr.io/open-traffic-generator/ixia-c-protocol-engine:1.00.0.507
    container_name: ixia-c-protocol-engine-a
    privileged: true
    # Must share traffic engine A's network namespace for protocol <-> traffic coordination
    network_mode: service:ixia-c-traffic-engine-a
    environment:
      - INTF_LIST=veth-a
    depends_on:
      - ixia-c-traffic-engine-a
    restart: unless-stopped

  ixia-c-traffic-engine-z:
    image: ghcr.io/open-traffic-generator/ixia-c-traffic-engine:1.8.0.245
    container_name: ixia-c-traffic-engine-z
    privileged: true
    environment:
      - ARG_IFACE_LIST=virtual@af_packet,veth-z
      - OPT_LISTEN_PORT=5555
      - OPT_NO_HUGEPAGES=Yes
      - OPT_NO_PINNING=Yes
      - OPT_ADAPTIVE_CPU_USAGE=Yes
      - WAIT_FOR_IFACE=Yes
    restart: unless-stopped

  ixia-c-protocol-engine-z:
    image: ghcr.io/open-traffic-generator/ixia-c-protocol-engine:1.00.0.507
    container_name: ixia-c-protocol-engine-z
    privileged: true
    # Must share traffic engine Z's network namespace
    network_mode: service:ixia-c-traffic-engine-z
    environment:
      - INTF_LIST=veth-z
    depends_on:
      - ixia-c-traffic-engine-z
    restart: unless-stopped
